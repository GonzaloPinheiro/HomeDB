services:
  api:
    build: .
    container_name: homedb-api
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - ConnectionStrings__PostgreSQL_HomeDB=Host=db;Database=homedb;Username=homedb_user;Password=${DB_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Auth__CookieSameSite=Strict
      - AllowedHosts=${ALLOWED_HOSTS}
      - Cors__AllowedOrigins__0=${FRONTEND_ORIGIN}
    volumes:
      - ./storage:/storage/files
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    container_name: homedb-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=homedb
      - POSTGRES_USER=homedb_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data  
    #Se usa para desarrollo, para poder conectarse en remoto
    #ports:
     # - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homedb_user -d homedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homedb-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api

volumes:
  postgres_data: